name: Web CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: corepack enable
      - run: pnpm install
      - run: pnpm --filter web guardrails:check
      - run: pnpm --filter web test
      - run: pnpm --filter web build
