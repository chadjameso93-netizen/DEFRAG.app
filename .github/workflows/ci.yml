name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r apps/api/requirements.txt
      - run: python -m compileall apps/api/app
